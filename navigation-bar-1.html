<!DOCTYPE html>
<html>

<head>

	<!-- Font Awesome -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">

	<!-- Google Font -->

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Lato:wght@700&display=swap" rel="stylesheet">

	<!-------->

	<style>
		* {
			margin: 0;
			padding: 0;
			-webkit-box-sizing: border-box;
			box-sizing: border-box;
			position: relative;
		}


		.navMenu {
			font-family: 'Advent Pro', sans-serif;
			padding: 8px;
			text-align: center;
			margin: 20px auto;
			width: 800px;
		}

		.navMenu a {
			color: #272727;
			text-decoration: none;
			text-transform: uppercase;
			display: inline-block;
			margin: 10px 20px 10px;
		}

		.background {
			background-color: #ece5f0;
		}

		.border {
			border: 1px transparant #cccccc;

		}

		.navMenu a:hover {
			position: relative;
			color: #a37d14;
			border-bottom: 5px solid #d09c0b;
			padding-bottom: 5px;

		}
	</style>
</head>

<body>

	<nav class="navMenu  border">
		<a id="home" onclick="navigate(this.id)" href="#"> <i class="fa-solid fa-house"></i> Home</a>
		<a id="materi" onclick="navigate(this.id)" href="#"> <i class="fa-solid fa-book"></i> Materi</a>
		<a id="bank soal" onclick="navigate(this.id)" href="#"> <i class="fa-solid fa-marker"></i> Bank Soal</a>
		<a id="sharing" onclick="navigate(this.id)" href="#"> <i class="fa-solid fa-bullhorn"></i> Sharing</a>
		<a id="info & timeline" onclick="navigate(this.id)" href="#"> <i class="fa-solid fa-calendar-days"></i> Info & Timeline</a>
		


	</nav>


	<script>

		let direction = "horizontal";
		if (direction === "vertical") {
			document.head.insertAdjacentHTML("beforeend", `<style>.navMenu a {display: block; text-align:left; margin:7px} i{width:15px; margin-right:5px} .navMenu{margin:3px}</style>`)
		}


		function navigate(id) {

			if (id == 'home')
				window.open("https://www.notion.so/CPNS-Study-Dashboard-33ef77e71ab98018bed7d2d43a925b52", '_self').focus();
			else if (id == "materi")
				window.open("https://www.notion.so/Materi-34cf77e71ab980baaa5dd2e533cd7757", '_self').focus();
			else if (id == "bank soal")
				window.open("https://www.notion.so/Bank-Soal-34cf77e71ab980a9b262c4671069e3dd", '_self').focus();
			else if (id == "sharing")
				window.open("https://www.notion.so/Sharing-34cf77e71ab98077b186cca093f7f1ec", '_self').focus();
			else if (id == "info & timeline")
				window.open("https://www.notion.so/Info-Timeline-34cf77e71ab98020aad6d045dbb13792", '_self').focus();
		}
	</script>


</body>

</html>
